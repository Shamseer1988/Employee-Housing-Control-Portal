# =============================================================================
# LOCAL / DEV stack — no TLS, no nginx.
#
# Single source of truth for config: **backend/.env** (copy it from
# backend/.env.example before the first run). Every service that needs
# DB / app secrets loads that same file via `env_file`, so Postgres
# initdb and the backend agree on credentials by construction — exactly
# like the PugWebApp setup. Only the compose-network coordinates
# (POSTGRES_HOST=db, REDIS_URL, BACKEND_INTERNAL_URL) are forced in
# `environment:` so they always point at the right container regardless
# of what backend/.env says for native dev.
#
# The Next.js frontend is the single entry point on http://localhost:8080
# and reverse-proxies /api/* to the backend over the compose network —
# first-party cookies, no CORS, no certificates.
#
#     cp backend/.env.example backend/.env      # first time only
#     docker compose up -d --build
#     → http://localhost:8080   (admin / ChangeMe123!)
#
# LIVE (Cloudflare TLS + nginx):  docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

name: pug-accommodation

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Postgres reads POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB from
    # backend/.env at first boot to run initdb — the same file the backend
    # loads — so creds match by construction. required:false lets the
    # stack still boot on the built-in defaults if the file is absent.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Fallbacks so a missing backend/.env still yields a working DB.
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pug_local_dev_pw}
    volumes:
      - pug_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      # $$ escapes to runtime so it resolves against the values env_file
      # loaded inside the container, not at compose-interpolation time.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pug} -d $${POSTGRES_DB:-pug_accommodation}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Operator secrets (DB creds, JWT/SECRET keys, super-user) come from
    # backend/.env — the same file the db service loaded above.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Compose-network coordinates always win over backend/.env (which
      # typically says localhost for native dev). The backend assembles
      # its DATABASE_URL from POSTGRES_* when DATABASE_URL isn't set
      # (see backend/config.py _database_uri()).
      FLASK_ENV: development
      POSTGRES_HOST: db
      # Clear any DATABASE_URL from backend/.env so the URL is
      # assembled from POSTGRES_* against the db container, not
      # localhost. environment: overrides env_file: in Compose.
      DATABASE_URL: ""
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pug_local_dev_pw}
      REDIS_URL: redis://redis:6379/0
      # Plain HTTP locally → cookies must NOT be Secure or the browser
      # silently drops them and login "succeeds" but never sticks.
      JWT_COOKIE_SECURE: "false"
      JWT_COOKIE_SAMESITE: "Lax"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      UPLOAD_FOLDER: /data/uploads
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@pugroup.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-ChangeMe123!}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      ENABLE_API_DOCS: "1"
    volumes:
      - pug_uploads:/data/uploads
    ports:
      # Direct API access for debugging (the app itself uses :8080).
      - "${BACKEND_PORT:-5000}:5000"
    command: >
      sh -c "flask --app wsgi wait-for-db &&
             flask --app wsgi init-db &&
             flask --app wsgi migrate-all &&
             flask --app wsgi seed &&
             gunicorn -c gunicorn.conf.py wsgi:app"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FLASK_ENV: development
      POSTGRES_HOST: db
      # Clear any DATABASE_URL from backend/.env so the URL is
      # assembled from POSTGRES_* against the db container, not
      # localhost. environment: overrides env_file: in Compose.
      DATABASE_URL: ""
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pug_local_dev_pw}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
      UPLOAD_FOLDER: /data/uploads
    volumes:
      - pug_uploads:/data/uploads
    command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info"]

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FLASK_ENV: development
      POSTGRES_HOST: db
      # Clear any DATABASE_URL from backend/.env so the URL is
      # assembled from POSTGRES_* against the db container, not
      # localhost. environment: overrides env_file: in Compose.
      DATABASE_URL: ""
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pug_local_dev_pw}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
    # Keep the PersistentScheduler's shelve file + pidfile in /tmp, not the
    # read-mostly /app workdir. With restart:unless-stopped a single crash
    # that leaves a half-written celerybeat-schedule in /app would otherwise
    # loop forever; /tmp is recreated per container so beat always starts
    # clean.
    command: ["celery", "-A", "celery_worker.celery", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule", "--pidfile="]

  frontend:
    build:
      context: ./frontend
      args:
        # Empty → the browser bundle calls /api/* RELATIVE to its own
        # origin (http://localhost:8080), keeping everything first-party.
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      # Server-side reverse-proxy target. Next.js forwards /api/* here over
      # the compose network. NOT a NEXT_PUBLIC_* var, so it never leaks
      # into the browser bundle. See frontend/next.config.mjs.
      BACKEND_INTERNAL_URL: http://backend:5000
    ports:
      # The app lives here: http://localhost:8080
      - "${APP_PORT:-8080}:3000"

volumes:
  pug_pgdata:
  pug_uploads:

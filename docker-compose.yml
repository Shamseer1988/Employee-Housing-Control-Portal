# =============================================================================
# LOCAL / DEV compose — no TLS, no nginx.
#
# The Next.js frontend is the single entry point on http://localhost:8080.
# It serves the UI and reverse-proxies /api/* to the backend over the
# compose network (see frontend/next.config.mjs -> BACKEND_INTERNAL_URL),
# so the browser only ever talks to one origin and the JWT cookies are
# first-party. No certificates, no port 80, nothing to conflict with IIS
# or other local services.
#
#     docker compose up -d --build
#     → open http://localhost:8080   (admin / ChangeMe123!)
#
# For the LIVE deployment (Cloudflare Origin Cert + nginx TLS) use:
#     docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

name: pug-accommodation

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pug_local_dev_pw}
    volumes:
      - pug_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pug} -d ${POSTGRES_DB:-pug_accommodation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD:-pug_local_dev_pw}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
      # Plain HTTP locally → cookies must NOT carry the Secure flag or the
      # browser silently drops them and login "succeeds" but never sticks.
      JWT_COOKIE_SECURE: "false"
      JWT_COOKIE_SAMESITE: "Lax"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@pugroup.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:-ChangeMe123!}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    # Exposed so you can curl the API directly while debugging.
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - pug_uploads:/data/uploads
    command: >
      sh -c "flask --app wsgi init-db &&
             flask --app wsgi migrate-all &&
             flask --app wsgi seed &&
             gunicorn -c gunicorn.conf.py wsgi:app"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD:-pug_local_dev_pw}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
    command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info"]

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD:-pug_local_dev_pw}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-12345}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret-change-in-production-67890}
    command: ["celery", "-A", "celery_worker.celery", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      args:
        # Empty → the browser bundle calls /api/* RELATIVE to its own
        # origin (http://localhost:8080), keeping everything first-party.
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      # Server-side reverse-proxy target. Next.js forwards /api/* here over
      # the compose network. NOT a NEXT_PUBLIC_* var, so it never leaks
      # into the browser bundle. See frontend/next.config.mjs.
      BACKEND_INTERNAL_URL: http://backend:5000
    ports:
      # The app lives here: http://localhost:8080
      - "${APP_PORT:-8080}:3000"

volumes:
  pug_pgdata:
  pug_uploads:

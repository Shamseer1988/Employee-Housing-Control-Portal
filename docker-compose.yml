name: pug-accommodation

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pug_pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pug} -d ${POSTGRES_DB:-pug_accommodation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Shared Redis: rate-limit store now (Phase 2), Celery broker + SSE
  # fan-out + notification unread cache later (Phases 5, 6, 8). No
  # persistence — none of those datasets need to survive a restart.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      # Production must list explicit origins — ProductionConfig.validate()
      # rejects "*" at boot. Same-origin via nginx doesn't trigger CORS
      # anyway, so for the typical single-host deployment you can set
      # this to your actual hostname (e.g. https://housing.example.com).
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS (no '*' in production)}
      UPLOAD_FOLDER: /data/uploads
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@pugroup.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:?set SUPERUSER_PASSWORD}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    volumes:
      - pug_uploads:/data/uploads
    # First boot: no migrations directory yet → init schema from models.
    # Subsequent boots / production: use Alembic upgrade.
    # Seed is idempotent and runs every boot.
    command: >
      sh -c "if [ -d migrations ] && [ -d migrations/versions ]; then
               flask --app wsgi db upgrade;
             else
               flask --app wsgi init-db;
             fi &&
             flask --app wsgi seed &&
             gunicorn -c gunicorn.conf.py wsgi:app"

  frontend:
    build:
      context: ./frontend
      # No NEXT_PUBLIC_API_URL build arg: the bundle uses RELATIVE URLs
      # so the app works on whatever host nginx is reached at — localhost,
      # LAN IP, Tailscale name, public domain — without rebuilding.
      # Override only if the frontend is served from a different origin
      # than the API (rare).
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production

  # Celery worker (Phase 5). Same image as backend, different command.
  # Picks up jobs enqueued via task.delay() (async bulk imports etc.)
  # and runs the daily sweeps fired by `beat`.
  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      UPLOAD_FOLDER: /data/uploads
    volumes:
      - pug_uploads:/data/uploads
    command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info"]

  # Celery beat scheduler — single process that fires recurring jobs
  # on the schedule defined in app/celery_app.py.
  beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
    command: ["celery", "-A", "app.celery_app.celery", "beat", "--loglevel=info"]

  nginx:
    build:
      context: ./deploy
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pug_pgdata:
  pug_uploads:

name: pug-accommodation-prod

# =============================================================================
# PRODUCTION compose.
#
# Cloudflare → nginx (TLS, edge allowlist) → backend / frontend / Postgres.
# Requires:
#   * .env with real SECRET_KEY / JWT_SECRET_KEY / POSTGRES_PASSWORD /
#     SUPERUSER_PASSWORD / CORS_ORIGINS (no '*') / REDIS_URL set
#     (see .env.example)
#   * deploy/ssl/origin.crt + deploy/ssl/origin.key from the Cloudflare
#     dashboard (see deploy/ssl/README.txt and DEPLOY.md)
#
# Launch:
#     docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pug_pgdata:/var/lib/postgresql/data
    # No host port mapping — Postgres only reachable inside the
    # compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pug} -d ${POSTGRES_DB:-pug_accommodation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Production mode triggers ProductionConfig.validate() —
      # rejects dev secrets and CORS '*' at boot.
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS (no '*' in production)}
      # Served over HTTPS (Cloudflare → nginx TLS) so the auth cookies
      # MUST be Secure. SameSite=Lax is correct for a same-origin SPA.
      JWT_COOKIE_SECURE: "true"
      JWT_COOKIE_SAMESITE: "Lax"
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@pugroup.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:?set SUPERUSER_PASSWORD}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-}
    volumes:
      - pug_uploads:/data/uploads
      - pug_backups:/data/backups
    command: >
      sh -c "flask --app wsgi wait-for-db &&
             flask --app wsgi init-db &&
             flask --app wsgi migrate-all &&
             flask --app wsgi seed &&
             gunicorn -c gunicorn.conf.py wsgi:app"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
    volumes:
      - pug_uploads:/data/uploads
      - pug_backups:/data/backups
    # The shared backend image bakes a curl localhost:5000 healthcheck;
    # celery processes don't serve HTTP, so disable it to avoid a
    # permanent false "unhealthy" status.
    healthcheck:
      disable: true
    command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info"]

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
    # Same reasoning as the worker — beat doesn't serve HTTP.
    healthcheck:
      disable: true
    command: ["celery", "-A", "celery_worker.celery", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side proxy target for /api/* (SSR / direct :3000 hits).
      # The browser uses relative /api/* through nginx. See
      # next.config.mjs rewrites().
      BACKEND_INTERNAL_URL: http://backend:5000

  nginx:
    build:
      context: ./deploy
      dockerfile: Dockerfile.nginx
      args:
        NGINX_CONF: nginx.conf
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Cloudflare Origin Certificate. Read-only mount.
      # See deploy/ssl/README.txt + DEPLOY.md.
      - ./deploy/ssl:/etc/nginx/ssl:ro
      # TODO: enable when corporate site (host #3) is deployed — nginx
      # serves /api/v1/uploads/ direct from this volume.
      # - pugweb_uploads:/var/www/pug/uploads:ro

  # =============================================================================
  # TODO: enable when finance app and corporate site are deployed on this host.
  #
  # Stub service entries for the two extra vhosts terminated by the
  # multi-site nginx config (deploy/nginx.conf). They are commented out
  # — uncomment + supply real `image:` / `build:` blocks when each app
  # is ready. The hostnames must match the `server` directive inside
  # the corresponding `upstream` block in nginx.conf:
  #     pugfin-backend   → upstream pugfin_backend
  #     pugfin-frontend  → upstream pugfin_frontend
  #     pugweb-api       → upstream pugweb_api
  #     pugweb-frontend  → upstream pugweb_frontend
  # =============================================================================
  #
  # pugfin-backend:
  #   image: pugfin-backend:latest          # or: build: { context: ../pugfin-backend }
  #   restart: unless-stopped
  #   # Expose only inside the compose network; nginx is the public entry.
  #
  # pugfin-frontend:
  #   image: pugfin-frontend:latest
  #   restart: unless-stopped
  #
  # pugweb-api:
  #   image: pugweb-api:latest
  #   restart: unless-stopped
  #
  # pugweb-frontend:
  #   image: pugweb-frontend:latest
  #   restart: unless-stopped
  #   # Reads from pugweb_uploads (external volume below); nginx also
  #   # mounts the same volume read-only so it can serve raw bytes.
  #   volumes:
  #     - pugweb_uploads:/var/www/pug/uploads

volumes:
  pug_pgdata:
  pug_uploads:
  pug_backups:
  # TODO: enable alongside the pugweb-* services above. Marked external
  # so the corporate CMS can write to it from its own pipeline without
  # this compose stack owning the volume's lifecycle.
  # pugweb_uploads:
  #   external: true

name: pug-accommodation-prod

# =============================================================================
# PRODUCTION compose — STANDALONE EDGE PROXY MODE.
#
# nginx is NOT in this stack. A separate stand-alone nginx (also in a
# compose stack of its own) terminates TLS for every public hostname
# and reverse-proxies into each app's containers via a SHARED external
# network called `pug_edge`. This compose only exposes the app's
# backend + frontend on that network under the aliases below; the edge
# proxy's nginx.conf references those aliases as upstream targets.
#
#     Cloudflare ──▶ stand-alone nginx ──┬─▶ housing-backend:5000
#                                        └─▶ housing-frontend:3000
#                                              (this stack)
#
# Prerequisites:
#   * The external network MUST exist before this stack comes up:
#         docker network create pug_edge       (one-time, on this host)
#   * .env with real SECRET_KEY / JWT_SECRET_KEY / POSTGRES_PASSWORD /
#     SUPERUSER_PASSWORD / CORS_ORIGINS (no '*' in production).
#   * The stand-alone edge proxy stack must include `pug_edge` in its
#     own `networks:` block and reference the upstreams as
#     `housing-backend:5000` / `housing-frontend:3000`.
#
# Launch:
#     docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pug_accommodation}
      POSTGRES_USER: ${POSTGRES_USER:-pug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pug_pgdata:/var/lib/postgresql/data
    # No host port mapping — Postgres only reachable inside the
    # compose network. NOT attached to pug_edge — the edge proxy must
    # not see internal infra.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pug} -d ${POSTGRES_DB:-pug_accommodation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    # default network only — same isolation rationale as db.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Production mode triggers ProductionConfig.validate() —
      # rejects dev secrets and CORS '*' at boot.
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      # In-stack Redis — hardcoded so the .env at repo root can't
      # substitute a localhost / external value in by accident. To
      # point at an EXTERNAL Redis, edit this line directly here.
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS (no '*' in production)}
      # Served over HTTPS (edge nginx → Cloudflare TLS) so the auth
      # cookies MUST be Secure. SameSite=Lax is correct for a
      # same-origin SPA.
      JWT_COOKIE_SECURE: "true"
      JWT_COOKIE_SAMESITE: "Lax"
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
      SUPERUSER_USERNAME: ${SUPERUSER_USERNAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-admin@pugroup.local}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:?set SUPERUSER_PASSWORD}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-}
    volumes:
      - pug_uploads:/data/uploads
      - pug_backups:/data/backups
    networks:
      default: {}
      edge:
        aliases:
          - housing-backend     # edge nginx Host #1 /api/ + /health target
    command: >
      sh -c "flask --app wsgi wait-for-db &&
             flask --app wsgi init-db &&
             flask --app wsgi migrate-all &&
             flask --app wsgi seed &&
             gunicorn -c gunicorn.conf.py wsgi:app"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      UPLOAD_FOLDER: /data/uploads
      BACKUP_FOLDER: /data/backups
    volumes:
      - pug_uploads:/data/uploads
      - pug_backups:/data/backups
    # Worker / beat do NOT join pug_edge — only HTTP-facing services
    # should be visible to the edge proxy.
    # The shared backend image bakes a curl localhost:5000 healthcheck;
    # celery processes don't serve HTTP, so disable it to avoid a
    # permanent false "unhealthy" status.
    healthcheck:
      disable: true
    command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info"]

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-pug}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pug_accommodation}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
    # Same reasoning as the worker — beat doesn't serve HTTP.
    healthcheck:
      disable: true
    command: ["celery", "-A", "celery_worker.celery", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side proxy target for /api/* (SSR / direct :3000 hits).
      # The browser uses relative /api/* through the edge nginx. See
      # next.config.mjs rewrites().
      BACKEND_INTERNAL_URL: http://backend:5000
    networks:
      default: {}
      edge:
        aliases:
          - housing-frontend    # edge nginx Host #1 / target

volumes:
  pug_pgdata:
  pug_uploads:
  pug_backups:

networks:
  # `default` is the implicit per-stack network — db / redis / worker /
  # beat / backend / frontend all sit on it and talk to each other
  # using the short service names (backend, redis, db, ...).
  #
  # `pug_edge` is the SHARED external bridge created once on this host:
  #     docker network create pug_edge
  # Every app stack that wants its HTTP services reachable from the
  # stand-alone edge nginx joins this same network. The aliases under
  # each service's `networks: edge:` block (housing-backend /
  # housing-frontend above) are how the edge nginx's upstream block
  # addresses us.
  edge:
    external: true
    name: pug_edge

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Path filter: a doc-only PR (only **.md / docs/** / docs-host artefacts
  # touched) skips every heavy job below. The cheap jobs (backend pytest,
  # frontend tsc+vitest+build) always run so a README typo can't sneak
  # in untested.
  #
  # Previously used dorny/paths-filter@v3 which started failing on this
  # PR with a 6-second exit and no diagnostic — replaced with a plain
  # `git diff --name-only` so we own the logic and it's easy to debug.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need merge-base history for the diff below. The default
          # shallow checkout (fetch-depth: 1) can't see the PR base.
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ -n "$(git rev-parse --verify HEAD~1 2>/dev/null)" ]; then
            BASE="HEAD~1"
          else
            # Brand-new repo (only the initial commit) — assume code change.
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          # Anything that isn't pure docs / lockfile-style metadata counts
          # as code. The grep -v inverts: lines NOT matching the doc
          # patterns. If even one such line exists, code=true.
          if echo "$CHANGED" \
              | grep -vE '(^|/)([^/]+\.md|LICENSE|\.gitignore)$|^docs/|^backups-host/' \
              | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: backend (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-secret-padded-to-32-bytes-1234
          JWT_SECRET_KEY: ci-jwt-secret-padded-to-32-bytes-5678
        run: pytest --cov=app --cov-report=term --cov-report=xml --disable-warnings -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: frontend (tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: http://localhost:5000
        run: npm run build

  # ---------------------------------------------------------------------------
  # Supply-chain audits. Both jobs are non-blocking on advisories below the
  # configured severity level — easy to tighten later.
  # ---------------------------------------------------------------------------
  audit-backend:
    name: supply-chain (pip-audit)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        continue-on-error: true
        with:
          inputs: backend/requirements.txt

  audit-frontend:
    name: supply-chain (npm audit)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Report-only until we baseline the existing advisories
      # (Next 14.2.10 → patched track). Dependabot will surface the
      # bump as a separate PR. Flip continue-on-error off once
      # `npm audit --audit-level=high --omit=dev` is clean.
      - run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Docker build + Trivy image scan. The scan reports CRITICAL/HIGH OS
  # and library vulns in the assembled images, NOT just direct deps.
  # ---------------------------------------------------------------------------
  docker:
    name: docker compose (build)
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        env:
          POSTGRES_PASSWORD: ci-pg-pass
          SECRET_KEY: ci-secret-padded-to-32-bytes-1234
          JWT_SECRET_KEY: ci-jwt-secret-padded-to-32-bytes-5678
          SUPERUSER_PASSWORD: ChangeMe123!
          CORS_ORIGINS: http://localhost
          PUBLIC_BASE_URL: http://localhost
        run: docker compose build --pull

  trivy:
    name: supply-chain (trivy image scan)
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build matrix image
        env:
          POSTGRES_PASSWORD: ci-pg-pass
          SECRET_KEY: ci-secret-padded-to-32-bytes-1234
          JWT_SECRET_KEY: ci-jwt-secret-padded-to-32-bytes-5678
          SUPERUSER_PASSWORD: ChangeMe123!
          CORS_ORIGINS: http://localhost
        run: docker compose build ${{ matrix.service }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pug-accommodation-${{ matrix.service }}:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Report-only for now; flip to 1 once the image baseline is
          # clean and we want to block regressions.
          exit-code: "0"
          format: table

  # ---------------------------------------------------------------------------
  # End-to-end against docker compose. Boots the full stack, runs the
  # Phase 9 Playwright specs against http://localhost, then tears down.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (playwright vs compose)
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: needs.changes.outputs.code == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Boot compose stack
        working-directory: .
        env:
          POSTGRES_PASSWORD: ci-pg-pass
          SECRET_KEY: ci-secret-padded-to-32-bytes-1234
          JWT_SECRET_KEY: ci-jwt-secret-padded-to-32-bytes-5678
          SUPERUSER_PASSWORD: ChangeMe123!
          CORS_ORIGINS: http://localhost:8080
        run: |
          # Local compose has no nginx — frontend on :8080 is the public
          # entry point and proxies /api/* to backend over the compose
          # network. (nginx lives only in docker-compose.prod.yml, which
          # requires Cloudflare origin certs we don't have in CI.)
          docker compose up -d --build db redis backend frontend
          # Poll the backend health endpoint via the frontend proxy so
          # we exercise the same path the e2e tests will hit.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/v1/health > /dev/null; then
              echo "stack ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Install Playwright + Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_USER: admin
          E2E_PASS: ChangeMe123!
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Stack logs on failure
        if: failure()
        working-directory: .
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        working-directory: .
        run: docker compose down -v

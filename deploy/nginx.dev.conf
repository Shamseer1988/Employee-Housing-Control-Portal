# =============================================================================
# Local development nginx — plain HTTP, no TLS, no Cloudflare allowlist.
# Used by docker-compose.yml. Production uses nginx.conf instead via
# docker-compose.prod.yml.
# =============================================================================

upstream pug_backend {
    server backend:5000;
    keepalive 32;
}

upstream pug_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 30M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml application/xml;
    gzip_min_length 1024;

    # Minimal security headers in dev — nothing browser-blocking but
    # still close enough to prod that you'd notice if something inline
    # broke. (Prod ships HSTS + CSP which would be hostile on a
    # self-signed local cert.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
        proxy_pass http://pug_backend/api/v1/health;
        access_log off;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE: backend streams text/event-stream from /api/v1/events/stream.
        # Disable buffering so chunks reach the browser immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;

        proxy_pass http://pug_backend;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://pug_frontend;
        proxy_read_timeout 60s;
    }
}

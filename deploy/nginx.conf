# =============================================================================
# Production nginx config: Cloudflare → nginx (TLS) → backend/frontend.
#
# TLS mode at Cloudflare: Full (Strict). Nginx terminates with an Origin
# Certificate Cloudflare minted for housing.example.com (15-year RSA).
# Cloudflare verifies the cert chain on every request — anyone trying to
# reach us directly by IP bypasses Cloudflare and is rejected by the
# allowlist below.
# =============================================================================

# -----------------------------------------------------------------------------
# Real-client-IP — trust the Cloudflare edge ranges only.
#
# CRITICAL: keep these in sync with Cloudflare's published lists:
#     https://www.cloudflare.com/ips-v4
#     https://www.cloudflare.com/ips-v6
# If a range here goes stale, CF-Connecting-IP becomes spoofable. A simple
# operator workflow is documented in DEPLOY.md → "Updating Cloudflare ranges".
# -----------------------------------------------------------------------------
# IPv4 ranges (verify before each deploy)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# -----------------------------------------------------------------------------
# Hard allowlist: any TCP connection from outside the Cloudflare edge gets
# a 403 before the request body is even read. Protects against bypass
# attempts on the static public IP.
#
# In Cloudflare's Full (Strict) mode the edge connects to nginx with its
# own certificates already validated, so dropping unknown peers can't
# accidentally lock out a legitimate Cloudflare connection.
# -----------------------------------------------------------------------------
geo $cf_edge {
    default 0;
    # IPv4
    173.245.48.0/20    1;
    103.21.244.0/22    1;
    103.22.200.0/22    1;
    103.31.4.0/22      1;
    141.101.64.0/18    1;
    108.162.192.0/18   1;
    190.93.240.0/20    1;
    188.114.96.0/20    1;
    197.234.240.0/22   1;
    198.41.128.0/17    1;
    162.158.0.0/15     1;
    104.16.0.0/13      1;
    104.24.0.0/14      1;
    172.64.0.0/13      1;
    131.0.72.0/22      1;
    # IPv6
    2400:cb00::/32     1;
    2606:4700::/32     1;
    2803:f800::/32     1;
    2405:b500::/32     1;
    2405:8100::/32     1;
    2a06:98c0::/29     1;
    2c0f:f248::/32     1;
    # Compose internal network — only used for `docker exec` curl smoke
    # tests; harmless from outside.
    172.16.0.0/12      1;
    10.0.0.0/8         1;
    127.0.0.1/32       1;
}

upstream pug_backend {
    server backend:5000;
    keepalive 32;
}

upstream pug_frontend {
    server frontend:3000;
    keepalive 32;
}

# Modern SSL session cache — shared across worker processes.
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# -----------------------------------------------------------------------------
# 80 → 301 https.
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Cloudflare's edge always presents an HTTPS scheme to us; if a stray
    # plain-HTTP request shows up, redirect once. ACME challenges are
    # delivered out-of-band (Cloudflare Origin Certs, not Let's Encrypt),
    # so there's nothing else to serve on :80.
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------------------------
# 443 — TLS termination + reverse proxy.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    # Cloudflare-edge allowlist (see geo block above).
    if ($cf_edge = 0) {
        return 403;
    }

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    client_max_body_size 30M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml application/xml;
    gzip_min_length 1024;

    # -------------------------------------------------------------------------
    # Security headers. "always" applies them to error responses too (4xx/5xx)
    # so a 500 page still ships HSTS etc.
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Tuned CSP for Next.js — inline scripts are needed for hydration,
    # inline styles for Tailwind's <style jsx>, and recharts emits inline
    # SVG. data: covers favicons; blob: covers downloaded Excel reports
    # served via URL.createObjectURL().
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # -------------------------------------------------------------------------
    # Health probe — public, unauthenticated; nginx's own healthcheck and
    # Cloudflare's monitor both hit this.
    # -------------------------------------------------------------------------
    location = /health {
        proxy_pass http://pug_backend/api/v1/health;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Attachment downloads — force the browser to download.
    # The backend already sets Content-Disposition: attachment and
    # Content-Type: application/octet-stream (Phase 3), but a wrong header
    # mistakenly added later won't let a stored HTML/SVG render inline
    # because nginx hides the upstream value and re-emits the safe one.
    # -------------------------------------------------------------------------
    location ~ ^/api/v1/attachments/[0-9]+/download$ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://pug_backend;
        proxy_read_timeout 120s;

        proxy_hide_header Content-Disposition;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -------------------------------------------------------------------------
    # Backend API.
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE: gunicorn streams text/event-stream from /api/v1/events/stream.
        # Disable buffering so chunks reach the client immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;

        proxy_pass http://pug_backend;
    }

    # -------------------------------------------------------------------------
    # Next.js frontend (catch-all).
    # -------------------------------------------------------------------------
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://pug_frontend;
        proxy_read_timeout 60s;
    }
}

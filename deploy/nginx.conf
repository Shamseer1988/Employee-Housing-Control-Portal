upstream pug_backend {
    server backend:5000;
    keepalive 32;
}

upstream pug_frontend {
    server frontend:3000;
    keepalive 32;
}

# When TLS is terminated by Cloudflare we listen on plain HTTP only.
# Add a `listen 443 ssl;` block + certs if terminating TLS here directly.
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 30M;

    # Force real client IP through Cloudflare's chain.
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # File uploads served straight from the API process; backend resolves
    # entitlement before send_file.
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://pug_backend;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://pug_backend/api/v1/health;
        access_log off;
    }

    # Next.js handles everything else.
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://pug_frontend;
        proxy_read_timeout 60s;
    }
}

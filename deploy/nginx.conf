# =============================================================================
# Production nginx config — multi-vhost.
#
# Hosts terminated on this box:
#   accommodation.parisunitedgroup.com  → Employee Housing Control Portal
#   pugfin.parisunitedgroup.com         → PUG Finance app          (planned)
#   parisunitedgroup.com / www.         → PUG corporate site       (planned)
#
# TLS mode at Cloudflare: Full (Strict). Nginx terminates with a single
# Cloudflare Origin Certificate that must cover all three hostnames
# (wildcard `*.parisunitedgroup.com` + apex). Cloudflare verifies the
# cert chain on every request — anyone trying to reach us directly by
# IP bypasses Cloudflare and is rejected by the allowlist below.
# =============================================================================

# -----------------------------------------------------------------------------
# Real-client-IP — trust the Cloudflare edge ranges only.
#
# CRITICAL: keep these in sync with Cloudflare's published lists:
#     https://www.cloudflare.com/ips-v4
#     https://www.cloudflare.com/ips-v6
# If a range here goes stale, CF-Connecting-IP becomes spoofable. A simple
# operator workflow is documented in DEPLOY.md → "Updating Cloudflare ranges".
# -----------------------------------------------------------------------------
# IPv4 ranges (verify before each deploy)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# -----------------------------------------------------------------------------
# Hard allowlist: any TCP connection from outside the Cloudflare edge gets
# a 403 from inside each vhost. Protects against bypass attempts on the
# static public IP and applies uniformly to all three sites.
#
# IMPORTANT: keyed on $realip_remote_addr (the ORIGINAL connecting peer)
# rather than $remote_addr. The realip module runs at POST_READ — by the
# time `if ($cf_edge = 0)` is evaluated below, $remote_addr has already
# been rewritten to the end-user's IP from CF-Connecting-IP. Matching
# THAT against the CF edge ranges would 403 every legitimate Cloudflare
# request. $realip_remote_addr is preserved as the CF edge IP (on
# direct DNS) or 127.0.0.1 (on Cloudflare Tunnel) — both are in the
# allowlist, so it works in either deployment mode.
#
# In Cloudflare's Full (Strict) mode the edge connects to nginx with its
# own certificates already validated, so dropping unknown peers can't
# accidentally lock out a legitimate Cloudflare connection.
# -----------------------------------------------------------------------------
geo $realip_remote_addr $cf_edge {
    default 0;
    # IPv4
    173.245.48.0/20    1;
    103.21.244.0/22    1;
    103.22.200.0/22    1;
    103.31.4.0/22      1;
    141.101.64.0/18    1;
    108.162.192.0/18   1;
    190.93.240.0/20    1;
    188.114.96.0/20    1;
    197.234.240.0/22   1;
    198.41.128.0/17    1;
    162.158.0.0/15     1;
    104.16.0.0/13      1;
    104.24.0.0/14      1;
    172.64.0.0/13      1;
    131.0.72.0/22      1;
    # IPv6
    2400:cb00::/32     1;
    2606:4700::/32     1;
    2803:f800::/32     1;
    2405:b500::/32     1;
    2405:8100::/32     1;
    2a06:98c0::/29     1;
    2c0f:f248::/32     1;
    # Compose internal network — only used for `docker exec` curl smoke
    # tests; harmless from outside.
    172.16.0.0/12      1;
    10.0.0.0/8         1;
    127.0.0.1/32       1;
}

# Modern SSL session cache — shared across worker processes and across
# every vhost.
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Global gzip — same rules everywhere; if a specific vhost ever needs
# different MIME types we can override at the server level.
gzip on;
gzip_types text/plain application/json application/javascript text/css image/svg+xml application/xml;
gzip_min_length 1024;

# -----------------------------------------------------------------------------
# Upstreams. Service hostnames resolve over the docker compose network.
# -----------------------------------------------------------------------------
# Host #1 — Employee Housing Control Portal (this repo, live today).
upstream pug_backend {
    server backend:5000;
    keepalive 32;
}
upstream pug_frontend {
    server frontend:3000;
    keepalive 32;
}

# Host #2 — PUG Finance app (planned).
# TODO: when the finance app's compose services are deployed (see
#       docker-compose.prod.yml stubs `pugfin-backend` / `pugfin-frontend`),
#       UNCOMMENT BOTH this upstream pair AND the matching server block
#       further down. Leaving these blocks active without the upstream
#       services running will crash nginx on startup with
#       `host not found in upstream "pugfin-backend"`.
# upstream pugfin_backend {
#     server pugfin-backend:5000;
#     keepalive 32;
# }
# upstream pugfin_frontend {
#     server pugfin-frontend:3000;
#     keepalive 32;
# }

# Host #3 — PUG corporate marketing site (planned).
# Same gate as host #2: uncomment together with the compose services and
# the matching server block below.
# upstream pugweb_api {
#     server pugweb-api:8000;
#     keepalive 32;
# }
# upstream pugweb_frontend {
#     server pugweb-frontend:3000;
#     keepalive 32;
# }

# -----------------------------------------------------------------------------
# 80 → 301 https for every hostname this box terminates.
# Listed explicitly (not `_`) so an unrelated hostname pointing at our
# IP doesn't get a redirect with our $host in the Location header.
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # Live hostnames only. As each planned vhost is brought online add
    # its hostname to this list so a stray :80 hit gets redirected to
    # https://<itself>.
    server_name accommodation.parisunitedgroup.com;
    #            pugfin.parisunitedgroup.com
    #            parisunitedgroup.com
    #            www.parisunitedgroup.com;

    # Cloudflare's edge always presents an HTTPS scheme to us; if a stray
    # plain-HTTP request shows up, redirect once. ACME challenges are
    # delivered out-of-band (Cloudflare Origin Certs, not Let's Encrypt),
    # so there's nothing else to serve on :80.
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------------------------
# Default 443 — unknown SNI / direct-IP probes get the connection closed
# without a response (444). Prevents the "first server block wins" footgun
# where an unrelated hostname or IP scan would otherwise be routed to
# vhost #1.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    # SSL config has to be loaded even on a reject server, otherwise the
    # TLS handshake fails before we can `return 444`.
    include /etc/nginx/snippets/ssl-common.conf;

    return 444;
}

# =============================================================================
# Host #1 — accommodation.parisunitedgroup.com (Employee Housing Portal).
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name accommodation.parisunitedgroup.com;

    if ($cf_edge = 0) {
        return 403;
    }

    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    # Tuned CSP for Next.js — inline scripts are needed for hydration,
    # inline styles for Tailwind's <style jsx>, and recharts emits inline
    # SVG. data: covers favicons; blob: covers downloaded Excel reports
    # served via URL.createObjectURL().
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 30M;

    # -------------------------------------------------------------------------
    # Health probe — public, unauthenticated; nginx's own healthcheck and
    # Cloudflare's monitor both hit this.
    # -------------------------------------------------------------------------
    location = /health {
        proxy_pass http://pug_backend/api/v1/health;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Attachment downloads — force the browser to download.
    # The backend already sets Content-Disposition: attachment and
    # Content-Type: application/octet-stream (Phase 3), but a wrong header
    # mistakenly added later won't let a stored HTML/SVG render inline
    # because nginx hides the upstream value and re-emits the safe one.
    # -------------------------------------------------------------------------
    location ~ ^/api/v1/attachments/[0-9]+/download$ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://pug_backend;
        proxy_read_timeout 120s;

        proxy_hide_header Content-Disposition;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -------------------------------------------------------------------------
    # Backend API.
    # -------------------------------------------------------------------------
    location /api/ {
        include /etc/nginx/snippets/proxy-common.conf;

        # SSE: gunicorn streams text/event-stream from /api/v1/events/stream.
        # Disable buffering so chunks reach the client immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;

        proxy_pass http://pug_backend;
    }

    # -------------------------------------------------------------------------
    # Next.js frontend (catch-all).
    # -------------------------------------------------------------------------
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://pug_frontend;
        proxy_read_timeout 60s;
    }
}


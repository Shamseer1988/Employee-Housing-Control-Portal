# Common proxy headers — included from each `location` that proxies to a
# Docker upstream. The host header passes through unchanged so each
# vhost-specific upstream sees its own server_name (cookie domains, CSRF
# allowed-host checks, etc.). X-Forwarded-Proto is hard-coded https
# because nginx terminates TLS — the original client came in over 443.
# Connection "" + HTTP/1.1 enables upstream keepalive against the
# upstream block's `keepalive 32;` directive.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_http_version 1.1;
proxy_set_header Connection "";

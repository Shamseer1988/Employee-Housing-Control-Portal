# Cloudflare Origin Certificate (single cert covers every vhost — see
# DEPLOY.md). Note: the existing cert was minted for
# accommodation.parisunitedgroup.com only; adding pugfin / corporate
# sites requires the cert to be re-minted as a wildcard
# `*.parisunitedgroup.com` + apex `parisunitedgroup.com`.
# TODO: re-mint Origin Cert as wildcard before bringing hosts #2 / #3
#       online, otherwise their TLS handshake will fail with a hostname
#       mismatch.
ssl_certificate     /etc/nginx/ssl/origin.crt;
ssl_certificate_key /etc/nginx/ssl/origin.key;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
